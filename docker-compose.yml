services:
  db:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - ./data/mongo:/data/db
    environment:
      MONGO_INITDB_DATABASE: munkerhex

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    depends_on:
      - db
    environment:
      MONGO_URL: mongodb://db:27017
    ports:
      - "8000:8000"

  web:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docs:/usr/share/nginx/html:ro
    depends_on:
      - api
